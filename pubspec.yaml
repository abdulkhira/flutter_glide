name: flutter_glide
description: >
  Flutter image loading inspired by Glide & Picasso. Auto-detects network, asset,
  SVG, and file sources. Ships GlideImage, GlideCircle, GlideBanner,
  and GlideGrid with shimmer placeholders, initials avatars, rounded corners,
  colour tints, tap callbacks, and memory-cache hints — zero config required.
version: 0.1.0
homepage: https://github.com/abdulkhira/flutter_glide
repository: https://github.com/abdulkhira/flutter_glide
issue_tracker: https://github.com/abdulkhira/flutter_glide/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
